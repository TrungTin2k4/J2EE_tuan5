<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Home page with products and search" />
    <title>Demo Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .body-content {
            min-height: calc(100vh - 160px);
            padding-top: 16px;
        }

        .product-form {
            max-width: 360px;
        }
    </style>
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div style="padding-left: 40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/create}">Products</a>
    </div>
    <form class="d-flex" role="search" th:action="@{/home/search}" th:method="get" style="padding-right: 20px;">
        <input class="form-control me-2" type="search" name="keyword" placeholder="Search" aria-label="Search" />
        <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
</nav>

<div layout:fragment="content" class="container body-content"></div>

<div class="card-footer text-center">
    <hr />
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8" />
    <title>Edit Product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <form th:action="@{/products/edit}" th:object="${product}"
          method="post" class="form product-form" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}" />

        <div class="form-group mb-2">
            <label for="name">Name</label>
            <input class="form-control" type="text" th:field="*{name}"
                   id="name" placeholder="product Name" />
            <div class="alert alert-warning mt-2 mb-0 p-2"
                 th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group mb-2">
            <label for="price">Price:</label>
            <input class="form-control" type="number" th:field="*{price}"
                   id="price" min="1" max="9999999" placeholder="price" />
            <div class="alert alert-warning mt-2 mb-0 p-2"
                 th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group mb-2">
            <label for="image">Image:</label>
            <input class="form-control" type="file" id="image" name="imageProduct"
                   accept="image/png,image/jpeg" />
            <div class="alert alert-warning mt-2 mb-0 p-2"
                 th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
        </div>

        <div class="form-group mb-2" th:if="${product.image != null and !#strings.isEmpty(product.image)}">
            <img height="120" width="150" th:src="@{/images/{image}(image=${product.image})}" alt="Product Image" />
        </div>

        <div class="form-group mb-3">
            <label for="category" class="form-label">Category:</label>
            <select th:field="*{category.id}" class="form-control" id="category">
                <option th:each="category : ${categories}"
                        th:value="${category.id}" th:text="${category.name}"></option>
            </select>
        </div>

        <input type="submit" class="btn btn-success" value="Update Product" />
    </form>
</div>
</body>
</html>
